<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | Jing Lyu</title>

    <meta name="description" content="Portfolio of Jing Lyu, 3D Character Artist specializing in stylized and realistic characters, creatures, and production-ready assets.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="site-logo" href="{{ url_for('home') }}">
                Jing Lyu
            </a>

            <button class="menu-toggle" aria-label="Open navigation menu" aria-expanded="false">
                ☰
            </button>

            <nav class="site-nav">
                <a href="{{ url_for('home') }}" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
                <a href="{{ url_for('portfolio') }}" class="{% if active_page == 'portfolio' %}active{% endif %}">Portfolio</a>
                <a href="{{ url_for('resume') }}" class="{% if active_page == 'resume' %}active{% endif %}">Resume</a>
                <a href="{{ url_for('contact') }}" class="{% if active_page == 'contact' %}active{% endif %}">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© 2026 Jing Lyu</p>
            <div class="footer-links">
                <a href="mailto:jcranejl@gmail.com"><i class="bi bi-envelope-fill"></i> Email</a>
                <a href="https://www.linkedin.com/in/jinglyu3d/" target="_blank" rel="noopener noreferrer"><i class="bi bi-linkedin"></i> LinkedIn</a>
            </div>
        </div>
    </footer>
</body>
</html>
