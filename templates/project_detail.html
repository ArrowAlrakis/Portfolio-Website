{% extends "base.html" %}

{% block content %}
<section class="section project-detail-hero">
    <div class="container">
        <p class="eyebrow">{{ project.category }}</p>
        <h1>{{ project.title }}</h1>
        <p class="page-intro project-detail-intro">{{ project.full_description }}</p>

        <div class="project-detail-cover">
            <img src="{{ url_for('static', filename=project.cover_image) }}" alt="{{ project.title }} cover image">
        </div>
    </div>
</section>

<section class="section breakdown-section">
    <div class="container">
        <div class="section-heading compact-heading">
            <p class="eyebrow">Project Breakdown</p>
            <h2>Process & Presentation</h2>
        </div>

        <div class="breakdown-gallery">
            {% for item in project.breakdown_images %}
            <figure class="breakdown-item">
                <img src="{{ url_for('static', filename=item.image) }}" alt="{{ project.title }} breakdown image {{ loop.index }}">
            </figure>
            {% endfor %}
        </div>

        <div class="project-detail-actions">
            <a class="btn btn-secondary" href="{{ url_for('portfolio') }}">Back to Portfolio</a>
        </div>
    </div>
</section>
{% endblock %}
